    litellm_params:
      model: mistral/mistral-small-latest
      api_key: "os.environ/MISTRAL_API_KEY" # ensure you have `MISTRAL_API_KEY` in your .env
  - model_name: "gpt-oss:20b"
    litellm_params:
      model: "gpt-oss:20b"
      api_base: "http://ollama:11434"
      ssl_verify: false
  - model_name: "llama3.1:latest"
